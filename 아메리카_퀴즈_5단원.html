<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌎 아메리카 개념 퀴즈 (5단원)</title>
<style>
  :root {
    --main: #1a7a4a;
    --main-light: #e6f6ec;
    --main-dark: #0f5233;
    --green: #2e9e5b;
    --green-light: #e6f6ec;
    --red: #d63636;
    --red-light: #fdeaea;
    --yellow: #f5a623;
    --yellow-light: #fff8e6;
    --gray: #6c757d;
    --gray-light: #f4f5f7;
    --dark: #1e2433;
    --white: #ffffff;
    --radius: 14px;
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: linear-gradient(135deg, #0f5233 0%, #1a7a4a 50%, #2e9e5b 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
  }
  #app { width: 100%; max-width: 720px; }

  .header { text-align: center; color: white; margin-bottom: 24px; }
  .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
  .header p  { font-size: 1rem; opacity: 0.85; margin-top: 6px; }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    margin-bottom: 16px;
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .progress-bar { flex: 1; height: 10px; background: #dde3ee; border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--main), #5ecb8a);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .progress-label { font-size: 0.85rem; color: var(--gray); white-space: nowrap; font-weight: 600; }

  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 99px;
    font-size: 0.78rem; font-weight: 700; margin-bottom: 12px;
    background: var(--main-light); color: var(--main-dark); letter-spacing: 0.3px;
  }
  .question-num { font-size: 0.82rem; color: var(--gray); margin-bottom: 6px; }
  .question-text {
    font-size: 1.15rem; font-weight: 700; color: var(--dark);
    line-height: 1.55; margin-bottom: 20px;
  }
  .question-hint {
    font-size: 0.88rem; color: var(--gray); background: var(--gray-light);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 6px;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; border: 2.5px solid #dde3ee; border-radius: 10px;
    background: var(--white); cursor: pointer; font-size: 0.97rem;
    font-family: inherit; color: var(--dark); text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--main); background: var(--main-light); transform: translateX(3px);
  }
  .option-btn .opt-label {
    width: 28px; height: 28px; border-radius: 50%; background: #edf0f7;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 0.88rem; flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .option-btn.correct { border-color: var(--green); background: var(--green-light); animation: correctPop 0.35s ease both; }
  .option-btn.correct .opt-label { background: var(--green); color: white; }
  .option-btn.wrong   { border-color: var(--red); background: var(--red-light); animation: shake 0.4s ease both; }
  .option-btn.wrong .opt-label   { background: var(--red); color: white; }
  .option-btn.reveal  { border-color: var(--green); background: var(--green-light); opacity: 0.85; }
  .option-btn.reveal .opt-label  { background: var(--green); color: white; }
  .option-btn:disabled { cursor: default; }

  @keyframes correctPop { 0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)} }

  .feedback {
    margin-top: 16px; padding: 14px 16px; border-radius: 10px;
    font-size: 0.93rem; line-height: 1.55; display: none;
    animation: fadeUp 0.3s ease both;
  }
  .feedback.correct { background: var(--green-light); border-left: 4px solid var(--green); color: #1a5c35; }
  .feedback.wrong   { background: var(--red-light);   border-left: 4px solid var(--red);   color: #7a1c1c; }
  .feedback .emoji  { font-size: 1.3rem; margin-right: 4px; }
  .feedback strong  { font-weight: 800; }

  .btn-next {
    display: none; margin-top: 18px; width: 100%; padding: 14px;
    border: none; border-radius: 10px; font-size: 1rem; font-family: inherit;
    font-weight: 700; cursor: pointer;
    background: linear-gradient(90deg, var(--main), #5ecb8a);
    color: white; letter-spacing: 0.3px; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-next:hover { opacity: 0.9; transform: translateY(-1px); }

  #score-screen { text-align: center; }
  .score-circle {
    width: 130px; height: 130px; border-radius: 50%; margin: 16px auto 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-weight: 900; font-size: 2.4rem; color: white;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    animation: popIn 0.5s cubic-bezier(.175,.885,.32,1.275) both;
  }
  @keyframes popIn { from{transform:scale(0.4);opacity:0} to{transform:scale(1);opacity:1} }
  .score-circle span { font-size: 0.95rem; font-weight: 600; opacity: 0.85; }
  .score-msg { font-size: 1.1rem; color: var(--dark); margin-bottom: 6px; font-weight: 700; }
  .score-sub { font-size: 0.9rem; color: var(--gray); margin-bottom: 24px; }

  .review-title { font-size: 1.05rem; font-weight: 800; color: var(--dark); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .review-item {
    border: 2px solid #f0d0d0; border-radius: 10px; padding: 14px 16px;
    margin-bottom: 10px; background: #fff9f9; text-align: left; animation: fadeUp 0.3s ease both;
  }
  .review-item .r-num { font-size: 0.78rem; color: var(--red); font-weight: 700; margin-bottom: 4px; }
  .review-item .r-q   { font-size: 0.95rem; color: var(--dark); font-weight: 700; margin-bottom: 8px; line-height: 1.45; }
  .review-item .r-my  { font-size: 0.88rem; color: var(--red); margin-bottom: 4px; }
  .review-item .r-ans { font-size: 0.88rem; color: var(--green); font-weight: 700; margin-bottom: 6px; }
  .review-item .r-exp { font-size: 0.87rem; color: #444; background: #f5f5f5; border-radius: 6px; padding: 8px 10px; line-height: 1.5; }

  .btn-group { display: flex; gap: 10px; margin-top: 20px; }
  .btn-retry, .btn-review {
    flex: 1; padding: 13px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-family: inherit; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-retry  { background: linear-gradient(90deg, var(--main), #5ecb8a); color: white; }
  .btn-review { background: var(--yellow-light); color: #7a5000; border: 2px solid var(--yellow); }
  .btn-retry:hover, .btn-review:hover { opacity: 0.88; transform: translateY(-1px); }

  #start-screen { text-align: center; }
  #start-screen h2 { font-size: 1.3rem; font-weight: 800; color: var(--dark); margin-bottom: 10px; }
  #start-screen p  { font-size: 0.93rem; color: var(--gray); line-height: 1.6; margin-bottom: 20px; }
  .topics { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 22px; }
  .topic-chip { padding: 6px 14px; border-radius: 99px; font-size: 0.83rem; font-weight: 600; background: var(--main-light); color: var(--main-dark); }
  .btn-start {
    display: block; width: 100%; padding: 16px; border: none; border-radius: 10px;
    font-size: 1.05rem; font-family: inherit; font-weight: 800; cursor: pointer;
    background: linear-gradient(90deg, var(--main), #5ecb8a);
    color: white; letter-spacing: 0.5px; transition: opacity 0.15s, transform 0.1s;
  }
  .btn-start:hover { opacity: 0.9; transform: translateY(-2px); }

  @media (max-width: 500px) {
    .header h1 { font-size: 1.5rem; }
    .card { padding: 20px; }
    .question-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🌎 아메리카 개념 퀴즈</h1>
    <p>미래엔 사회1 · 5단원 · 교과서 91~110쪽</p>
  </div>

  <div class="card" id="start-screen">
    <h2>퀴즈를 시작해볼까요? 🚀</h2>
    <p>아메리카의 자연환경, 민족·문화, 초국적 기업에 관한<br>
       <strong>총 30문제</strong>를 풀어봅니다.<br>
       틀린 문제는 마지막에 <strong>오답 노트</strong>로 다시 확인할 수 있어요!</p>
    <div class="topics">
      <span class="topic-chip">🗺️ 지역 구분</span>
      <span class="topic-chip">🏔️ 자연환경·지형</span>
      <span class="topic-chip">🌡️ 기후</span>
      <span class="topic-chip">👥 민족·인종</span>
      <span class="topic-chip">🎭 문화 혼종성</span>
      <span class="topic-chip">🏢 초국적 기업</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">퀴즈 시작하기 ▶</button>
  </div>

  <div class="card" id="quiz-screen" style="display:none">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="progress-label" id="prog-label"></div>
    </div>
    <div class="badge" id="q-badge"></div>
    <div class="question-num" id="q-num"></div>
    <div class="question-text" id="q-text"></div>
    <div class="question-hint" id="q-hint" style="display:none">💡 <span id="q-hint-text"></span></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <div class="card" id="score-screen" style="display:none">
    <div class="score-circle" id="score-circle">
      <span id="score-fraction"></span>
      <span>점수</span>
    </div>
    <div class="score-msg" id="score-msg"></div>
    <div class="score-sub" id="score-sub"></div>
    <div class="btn-group">
      <button class="btn-retry" onclick="retryQuiz()">🔄 다시 풀기</button>
      <button class="btn-review" id="btn-review" onclick="showReview()" style="display:none">📒 오답 노트 보기</button>
    </div>
    <div id="review-section" style="display:none; margin-top:28px;">
      <div class="review-title">📒 오답 노트</div>
      <div id="review-list"></div>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [

  // ── ❶ 지역 구분 (1~4) ──
  {
    cat: "🗺️ 지역 구분",
    q: "아메리카를 지리적으로 북아메리카와 남아메리카로 구분하는 기준이 되는 지형은?",
    opts: ["리오그란데강", "파나마 지협", "아마존강", "미시시피강"],
    ans: 1,
    exp: "아메리카는 일반적으로 파나마 지협을 기준으로 북아메리카와 남아메리카로 구분합니다."
  },
  {
    cat: "🗺️ 지역 구분",
    q: "아메리카를 문화를 기준으로 구분할 때 캐나다와 미국이 속하는 지역은?",
    opts: ["라틴 아메리카", "앵글로아메리카", "중앙아메리카", "카리브 아메리카"],
    ans: 1,
    exp: "문화를 기준으로 구분할 때 캐나다와 미국은 앵글로아메리카, 그 외 지역은 라틴 아메리카로 구분합니다. 두 지역의 경계는 리오그란데강입니다."
  },
  {
    cat: "🗺️ 지역 구분",
    q: "아메리카의 지역 구분에 관한 설명으로 옳지 않은 것은?",
    opts: [
      "파나마 지협을 기준으로 북·남아메리카로 구분한다",
      "카리브해의 섬나라들은 남아메리카에 속한다",
      "미국은 앵글로아메리카에 속한다",
      "북아메리카의 일부를 중앙아메리카로 따로 구분하기도 한다"
    ],
    ans: 1,
    exp: "카리브해의 쿠바, 자메이카 등 섬나라들은 남아메리카가 아니라 북아메리카(또는 중앙아메리카)에 속합니다."
  },
  {
    cat: "🗺️ 지역 구분",
    q: "다음 설명에 해당하는 국가는? ▶ 북아메리카에 위치하며, 문화적 기준으로는 라틴 아메리카에 속한다. 수도는 해발 고도 약 2,240 m의 고산 도시이다.",
    opts: ["캐나다", "멕시코", "브라질", "아르헨티나"],
    ans: 1,
    exp: "멕시코는 지리적으로 북아메리카에 속하지만 문화적으로는 라틴 아메리카에 속합니다. 수도 멕시코시티는 해발 고도 약 2,240m의 고산 도시입니다."
  },

  // ── ❶ 자연환경·지형 (5~8) ──
  {
    cat: "🏔️ 자연환경·지형",
    q: "북아메리카 서부에 위치하며 높고 험준하고, 지각 운동이 활발하여 지진과 화산 활동이 일어나기도 하는 산맥은?",
    opts: ["애팔래치아산맥", "시에라마드레산맥", "로키산맥", "안데스산맥"],
    ans: 2,
    exp: "로키산맥은 북아메리카 서부를 남북으로 가로지르는 높고 험준한 산맥으로, 형성 시기가 오래되지 않아 지진과 화산 활동이 활발합니다."
  },
  {
    cat: "🏔️ 자연환경·지형",
    q: "북아메리카 동부에 위치한 산맥으로, 오랜 시간 침식을 받아 비교적 고도가 낮고 경사가 완만한 산맥은?",
    opts: ["로키산맥", "시에라네바다산맥", "안데스산맥", "애팔래치아산맥"],
    ans: 3,
    exp: "애팔래치아산맥은 북아메리카 동부에 위치하며 형성 시기가 오래되어 침식을 많이 받아 고도가 낮고 경사가 완만합니다."
  },
  {
    cat: "🏔️ 자연환경·지형",
    q: "안데스산맥에서 발원하여 적도를 따라 서쪽에서 동쪽으로 흘러 대서양으로 유입되는 하천은?",
    opts: ["미시시피강", "오리노코강", "아마존강", "리오그란데강"],
    ans: 2,
    exp: "아마존강은 남아메리카 안데스산맥에서 발원하여 적도를 따라 브라질을 가로질러 대서양으로 흘러드는 세계 최대 유량의 강입니다."
  },
  {
    cat: "🏔️ 자연환경·지형",
    q: "미국 대평원을 가로질러 흘러 멕시코만으로 유입되는 강은?",
    opts: ["콜로라도강", "리오그란데강", "미시시피강", "허드슨강"],
    ans: 2,
    exp: "미시시피강은 미국 대평원을 남북으로 가로질러 멕시코만으로 흘러드는 북아메리카의 대표적인 하천입니다."
  },

  // ── ❶ 기후 (9~12) ──
  {
    cat: "🌡️ 기후",
    q: "북아메리카 내륙 지역에 건조 기후가 넓게 나타나는 이유는?",
    opts: [
      "적도에 가까워 기온이 높기 때문에",
      "산맥의 영향으로 바다에서 불어오는 습윤한 공기가 차단되기 때문에",
      "한류의 영향을 받기 때문에",
      "계절풍의 영향으로 강수량이 적기 때문에"
    ],
    ans: 1,
    exp: "북아메리카 내륙 지역은 로키산맥 등 높은 산맥이 가로막아 바다에서 불어오는 습윤한 공기가 차단되므로 건조 기후가 넓게 나타납니다."
  },
  {
    cat: "🌡️ 기후",
    q: "적도 주변의 안데스산맥 일대에서 나타나는 기후로, 연중 서늘하여 인간이 생활하기에 적합한 기후는?",
    opts: ["열대 우림 기후", "사바나 기후", "고산 기후", "냉대 기후"],
    ans: 2,
    exp: "적도 주변의 안데스산맥 일대는 해발 고도가 높아 연중 서늘한 고산 기후가 나타납니다. 저지대의 덥고 습한 열대 기후보다 인간이 생활하기에 적합하여 도시가 발달하였습니다."
  },
  {
    cat: "🌡️ 기후",
    q: "콜롬비아의 보고타, 에콰도르의 키토, 페루의 쿠스코가 공통적으로 가진 특성은?",
    opts: [
      "태평양 해안에 위치한 항구 도시이다",
      "해발 고도 2,500 m 이상의 고지대에 위치한 고산 도시이다",
      "아마존강 유역에 위치한 열대 도시이다",
      "라틴 아메리카 최대 인구 밀집 지역이다"

    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  questions = shuffle(QUESTIONS);
  current = 0; score = 0; wrongList = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const total = questions.length;

  document.getElementById('prog-fill').style.width = ((current / total) * 100) + '%';
  document.getElementById('prog-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('q-badge').textContent = q.cat;
  document.getElementById('q-num').textContent = `문제 ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;

  const hintEl = document.getElementById('q-hint');
  if (q.hint) { hintEl.style.display = 'flex'; document.getElementById('q-hint-text').textContent = q.hint; }
  else hintEl.style.display = 'none';

  const labels = ['①', '②', '③', '④'];
  const indices = shuffle([0, 1, 2, 3]);
  const optWrap = document.getElementById('options');
  optWrap.innerHTML = '';
  indices.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-label">${labels[pos]}</span><span>${q.opts[origIdx]}</span>`;
    btn.dataset.orig = origIdx;
    btn.onclick = () => selectAnswer(btn, origIdx === q.ans, q);
    optWrap.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none'; fb.className = 'feedback';
  const btnNext = document.getElementById('btn-next');
  btnNext.style.display = 'none';
  btnNext.textContent = current + 1 < total ? '다음 문제 →' : '결과 보기 🎉';
}

function selectAnswer(clickedBtn, isCorrect, q) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    clickedBtn.classList.add('correct');
    score++;
    fb.className = 'feedback correct';
    fb.innerHTML = `<span class="emoji">🎉</span> <strong>정답이에요!</strong><br>${q.exp}`;
  } else {
    clickedBtn.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b => {
      if (parseInt(b.dataset.orig) === q.ans) b.classList.add('reveal');
    });
    fb.className = 'feedback wrong';
    fb.innerHTML = `<span class="emoji">😅</span> <strong>아쉽네요!</strong> 정답은 <strong>"${q.opts[q.ans]}"</strong>이에요.<br>${q.exp}`;
    wrongList.push({ q, myAns: clickedBtn.querySelector('span:last-child').textContent });
  }
  fb.style.display = 'block';
  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current < questions.length) showQuestion();
  else showScore();
}

function showScore() {
  document.getElementById('quiz-screen').style.display = 'none';
  const screen = document.getElementById('score-screen');
  screen.style.display = 'block';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  const circle = document.getElementById('score-circle');
  circle.textContent = '';
  const fracEl = document.createElement('div');
  fracEl.id = 'score-fraction';
  fracEl.textContent = `${score}/${total}`;
  const spanEl = document.createElement('span');
  spanEl.textContent = `${pct}점`;
  circle.appendChild(fracEl);
  circle.appendChild(spanEl);

  if (pct >= 90) circle.style.background = 'linear-gradient(135deg,#2e9e5b,#5ecb8a)';
  else if (pct >= 70) circle.style.background = 'linear-gradient(135deg,#1a7a4a,#5ecb8a)';
  else if (pct >= 50) circle.style.background = 'linear-gradient(135deg,#f5a623,#f7c56a)';
  else circle.style.background = 'linear-gradient(135deg,#d63636,#f07070)';

  const msgs = [
    { min: 90, msg: "완벽해요! 아메리카 박사 🎓", sub: "5단원 개념을 완벽히 이해하고 있어요!" },
    { min: 70, msg: "잘했어요! 🌟", sub: "핵심 개념을 잘 파악하고 있어요. 조금만 더 복습해볼까요?" },
    { min: 50, msg: "아직 더 공부가 필요해요 📚", sub: "틀린 문제 위주로 다시 복습해 보세요!" },
    { min: 0,  msg: "처음부터 다시 시작해봐요 💪", sub: "교과서 91~110쪽을 다시 읽고 재도전해 보세요!" }
  ];
  const m = msgs.find(x => pct >= x.min);
  document.getElementById('score-msg').textContent = m.msg;
  document.getElementById('score-sub').textContent = m.sub;

  const btnReview = document.getElementById('btn-review');
  btnReview.style.display = wrongList.length > 0 ? 'block' : 'none';
  document.getElementById('review-section').style.display = 'none';
}

function showReview() {
  const section = document.getElementById('review-section');
  if (section.style.display === 'block') { section.style.display = 'none'; return; }
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  wrongList.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.style.animationDelay = (idx * 0.07) + 's';
    div.innerHTML = `
      <div class="r-num">❌ 오답 ${idx + 1} · ${item.q.cat}</div>
      <div class="r-q">${item.q.q}</div>
      <div class="r-my">내 답: ${item.myAns}</div>
      <div class="r-ans">✅ 정답: ${item.q.opts[item.q.ans]}</div>
      <div class="r-exp">💡 ${item.q.exp}</div>
    `;
    list.appendChild(div);
  });
  section.style.display = 'block';
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function retryQuiz() {
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('review-section').style.display = 'none';
  startQuiz();
}
</script>
</body>
</html>
